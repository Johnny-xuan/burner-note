version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: burner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: burner-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: burner-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  uploads:
